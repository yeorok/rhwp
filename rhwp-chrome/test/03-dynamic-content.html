<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>rhwp 테스트 3: 동적 콘텐츠</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 20px; }
    h2 { font-size: 16px; color: #475569; margin-top: 32px; }
    .desc { color: #64748b; font-size: 14px; margin-bottom: 8px; }
    .section { border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    button { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    #dynamic-area { min-height: 60px; border: 2px dashed #cbd5e1; border-radius: 8px; padding: 16px; margin-top: 12px; }
    .pass { background: #dcfce7; padding: 2px 8px; border-radius: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>rhwp 테스트 3: 동적 콘텐츠 (AJAX 게시판 시뮬레이션)</h1>
  <p class="desc">버튼을 클릭하면 JavaScript로 HWP 링크가 동적으로 추가됩니다.<br>
  MutationObserver가 동작하여 새로 추가된 링크에도 <span class="pass">H</span> 배지가 표시되면 성공입니다.</p>

  <div class="section">
    <h2>게시판 첨부파일 시뮬레이션</h2>
    <button onclick="addBoardPost()">게시글 로드 (AJAX 시뮬레이션)</button>
    <button onclick="addBatchPosts()">5개 일괄 로드</button>
    <div id="dynamic-area">
      <em style="color:#94a3b8">여기에 동적으로 HWP 링크가 추가됩니다</em>
    </div>
  </div>

  <script>
    let postCount = 0;

    function addBoardPost() {
      postCount++;
      const area = document.getElementById('dynamic-area');
      if (postCount === 1) area.innerHTML = '';

      const post = document.createElement('div');
      post.style.padding = '8px 0';
      post.style.borderBottom = '1px solid #e2e8f0';
      post.innerHTML = `
        <strong>게시글 #${postCount}</strong> —
        <a href="/samples/biz_plan.hwp"
           data-hwp="true"
           data-hwp-title="첨부문서 ${postCount}"
           data-hwp-pages="${Math.floor(Math.random() * 20) + 1}"
           data-hwp-size="${Math.floor(Math.random() * 500000) + 50000}">
          첨부문서_${postCount}.hwp
        </a>
      `;
      area.appendChild(post);
    }

    function addBatchPosts() {
      for (let i = 0; i < 5; i++) {
        setTimeout(addBoardPost, i * 200);
      }
    }
  </script>
</body>
</html>
